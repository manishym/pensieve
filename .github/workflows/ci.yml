name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debug
            cxx_flags: ""
            linker_flags: ""

          - name: asan
            cxx_flags: "-fsanitize=address -fno-omit-frame-pointer"
            linker_flags: "-fsanitize=address"

          - name: tsan
            cxx_flags: "-fsanitize=thread"
            linker_flags: "-fsanitize=thread"

          - name: ubsan
            cxx_flags: "-fsanitize=undefined -fno-sanitize-recover=all"
            linker_flags: "-fsanitize=undefined"

    name: ${{ matrix.name }}
    env:
      ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
      TSAN_OPTIONS: second_deadlock_stack=1:halt_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.linker_flags }}"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        id: test
        run: |
          set +e
          TEST_OUT=$(ctest --test-dir build --output-on-failure 2>&1)
          TEST_EXIT=$?
          set -e
          echo "$TEST_OUT"
          PASSED=$(echo "$TEST_OUT" | grep -oP '\d+(?= tests passed)' || echo "0")
          FAILED=$(echo "$TEST_OUT" | grep -oP '\d+(?= tests failed)' || echo "0")
          TOTAL=$(echo "$TEST_OUT" | grep -oP 'out of \K\d+' || echo "?")
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "exit_code=$TEST_EXIT" >> "$GITHUB_OUTPUT"
          exit $TEST_EXIT

  report:
    name: CI Summary
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && always()
    needs: build-and-test
    steps:
      - name: Post CI summary to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-report
          message: |
            ## 🛡️ CI / Sanitizer Results

            **Overall:** ${{ needs.build-and-test.result == 'success' && '✅ All checks passed' || '❌ Some checks failed' }}

            | Build | Description |
            |-------|-------------|
            | Debug | Standard debug build |
            | ASan  | AddressSanitizer (memory errors) |
            | TSan  | ThreadSanitizer (data races) |
            | UBSan | UndefinedBehaviorSanitizer |

            *Expand individual jobs above for per-sanitizer results.*
