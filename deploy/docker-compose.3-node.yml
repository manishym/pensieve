# Pensieve 3-Node Cluster
#
# Usage:
#   docker compose -f deploy/docker-compose.3-node.yml up --build
#
# Clients connect to any node on port 11211-11213:
#   python3 deploy/client.py 127.0.0.1 11211 PUT hello world
#   python3 deploy/client.py 127.0.0.1 11212 GET hello

x-pensieve-common: &pensieve-common
  build:
    context: ..
    dockerfile: Dockerfile
  restart: unless-stopped
  # io_uring requires these capabilities on some hosts
  security_opt:
    - seccomp:unconfined
  ulimits:
    memlock:
      soft: -1
      hard: -1

networks:
  pensieve-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  node1:
    <<: *pensieve-common
    container_name: pensieve-node1
    hostname: node1
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.11
    ports:
      - "11211:11211"
    environment:
      PENSIEVE_HOST: "172.30.0.11"
      PENSIEVE_DATA_PORT: "11211"
      PENSIEVE_GOSSIP_PORT: "7946"
      PENSIEVE_MEMORY_MB: "64"
      # node1 is the seed -- no PENSIEVE_SEED

  node2:
    <<: *pensieve-common
    container_name: pensieve-node2
    hostname: node2
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.12
    ports:
      - "11212:11211"
    environment:
      PENSIEVE_HOST: "172.30.0.12"
      PENSIEVE_DATA_PORT: "11211"
      PENSIEVE_GOSSIP_PORT: "7946"
      PENSIEVE_MEMORY_MB: "64"
      PENSIEVE_SEED: "172.30.0.11:7946"
    depends_on:
      - node1

  node3:
    <<: *pensieve-common
    container_name: pensieve-node3
    hostname: node3
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.13
    ports:
      - "11213:11211"
    environment:
      PENSIEVE_HOST: "172.30.0.13"
      PENSIEVE_DATA_PORT: "11211"
      PENSIEVE_GOSSIP_PORT: "7946"
      PENSIEVE_MEMORY_MB: "64"
      PENSIEVE_SEED: "172.30.0.11:7946"
    depends_on:
      - node1
