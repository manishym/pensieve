# Pensieve 3-Node Cluster + Multi-Client Benchmark with Consolidator
#
# Usage:
#   docker compose -f deploy/docker-compose.bench.yml up --build
#
# Each bench container runs 2 threads to utilise hyperthreading.
# bench1 -> CPU 6, bench2 -> CPU 2, bench3 -> CPU 7
# The consolidator waits for all 3 to finish then prints a merged report.

x-pensieve-common: &pensieve-common
  build:
    context: ..
    dockerfile: Dockerfile
  restart: unless-stopped
  security_opt:
    - seccomp:unconfined
  ulimits:
    memlock:
      soft: -1
      hard: -1

x-bench-common: &bench-common
  build:
    context: ..
    dockerfile: Dockerfile.bench
  depends_on:
    - node1
    - node2
    - node3
  volumes:
    - bench-results:/results
  networks:
    pensieve-net: {}

volumes:
  bench-results:


networks:
  pensieve-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  node1:
    <<: *pensieve-common
    container_name: pensieve-node1
    hostname: node1
    cpuset: "3"
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.11
    environment:
      PENSIEVE_HOST: "172.30.0.11"
      PENSIEVE_DATA_PORT: "11211"
      PENSIEVE_GOSSIP_PORT: "7946"
      PENSIEVE_MEMORY_MB: "64"

  node2:
    <<: *pensieve-common
    container_name: pensieve-node2
    hostname: node2
    cpuset: "4"
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.12
    environment:
      PENSIEVE_HOST: "172.30.0.12"
      PENSIEVE_DATA_PORT: "11211"
      PENSIEVE_GOSSIP_PORT: "7946"
      PENSIEVE_MEMORY_MB: "64"
      PENSIEVE_SEED: "172.30.0.11:7946"
    depends_on:
      - node1

  node3:
    <<: *pensieve-common
    container_name: pensieve-node3
    hostname: node3
    cpuset: "5"
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.13
    environment:
      PENSIEVE_HOST: "172.30.0.13"
      PENSIEVE_DATA_PORT: "11211"
      PENSIEVE_GOSSIP_PORT: "7946"
      PENSIEVE_MEMORY_MB: "64"
      PENSIEVE_SEED: "172.30.0.11:7946"
    depends_on:
      - node1

  bench1:
    <<: *bench-common
    container_name: pensieve-bench1
    hostname: bench1
    cpuset: "6"
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.20
    command:
      - "--seed"
      - "172.30.0.11:11211"
      - "--num-keys"
      - "1000000"
      - "--value-size"
      - "32"
      - "--threads"
      - "4"
      - "--wait"
      - "5"
      - "--output"
      - "/results/bench1.json"

  bench2:
    <<: *bench-common
    container_name: pensieve-bench2
    hostname: bench2
    cpuset: "2"
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.21
    command:
      - "--seed"
      - "172.30.0.12:11211"
      - "--num-keys"
      - "1000000"
      - "--value-size"
      - "32"
      - "--threads"
      - "4"
      - "--wait"
      - "5"
      - "--output"
      - "/results/bench2.json"

  bench3:
    <<: *bench-common
    container_name: pensieve-bench3
    hostname: bench3
    cpuset: "7"
    networks:
      pensieve-net:
        ipv4_address: 172.30.0.22
    command:
      - "--seed"
      - "172.30.0.13:11211"
      - "--num-keys"
      - "1000000"
      - "--value-size"
      - "32"
      - "--threads"
      - "4"
      - "--wait"
      - "5"
      - "--output"
      - "/results/bench3.json"

  consolidator:
    image: python:3.12-slim
    container_name: pensieve-consolidator
    volumes:
      - bench-results:/results
      - ./consolidate.py:/app/consolidate.py:ro
    environment:
      RESULTS_DIR: "/results"
      EXPECTED_CLIENTS: "3"
    depends_on:
      bench1:
        condition: service_completed_successfully
      bench2:
        condition: service_completed_successfully
      bench3:
        condition: service_completed_successfully
    command: [ "python3", "/app/consolidate.py" ]
